<!DOCTYPE html>
<html>
<head>
<title>Prontuário</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🩺 Prontuário de Enfermagem</h2>

<div class="card">

<h3>1️⃣ Identificação</h3>
<input placeholder="Nome">
<input placeholder="Idade">
<input placeholder="Sexo">
<input placeholder="Escolaridade">
<input placeholder="Profissão">
<input placeholder="Acompanhante">

<p>Tipo de deficiência auditiva:</p>
<label><input type="checkbox"> Surdez total</label>
<label><input type="checkbox"> Parcial</label>
<label><input type="checkbox"> Congênita</label>
<label><input type="checkbox"> Adquirida</label>

</div>

<div class="card">

<h3>2️⃣ Comunicação</h3>

<label><input type="checkbox"> LIBRAS</label>
<label><input type="checkbox"> Leitura labial</label>
<label><input type="checkbox"> Escrita</label>
<label><input type="checkbox"> Aplicativos</label>
<label><input type="checkbox"> Acompanhante</label>

<input placeholder="Outros">

<p>Necessita intérprete?</p>
<label><input type="radio" name="interp"> Sim</label>
<label><input type="radio" name="interp"> Não</label>

</div>

<div class="card">

<h3>3️⃣ Queixa Principal</h3>
<textarea placeholder="O que trouxe você aqui hoje?"></textarea>

</div>

<div class="card">

<h3>4️⃣ História da Doença Atual</h3>
<input placeholder="Início">
<input placeholder="Duração">
<input placeholder="Intensidade">
<input placeholder="Fatores que pioram/melhoram">
<input placeholder="Já procurou atendimento?">

</div>

<div class="card">

<h3>5️⃣ Histórico de Saúde</h3>
<textarea placeholder="Doenças prévias"></textarea>
<textarea placeholder="Medicamentos"></textarea>
<textarea placeholder="Alergias"></textarea>
<textarea placeholder="Internações"></textarea>
<textarea placeholder="Histórico familiar"></textarea>

</div>

<div class="card">

<h3>6️⃣ Comunicação</h3>

<p>Autonomia:</p>
<label><input type="radio" name="auto"> Independente</label>
<label><input type="radio" name="auto"> Parcial</label>
<label><input type="radio" name="auto"> Dependente</label>

<textarea placeholder="Observações"></textarea>

</div>

<div class="card">

<h3>7️⃣ Exame Físico</h3>
<input placeholder="Sinais vitais">
<input placeholder="Estado geral">
<input placeholder="Dor (0-10)">
<textarea placeholder="Observações"></textarea>

</div>

<div class="card">

<h3>8️⃣ Psicossocial</h3>
<textarea placeholder="Interação social"></textarea>
<textarea placeholder="Ansiedade/isolamento"></textarea>
<textarea placeholder="Apoio familiar"></textarea>

</div>

<div class="card">

<h3>9️⃣ Acessibilidade</h3>
<textarea placeholder="Dificuldades no atendimento"></textarea>
<textarea placeholder="Profissionais sabem se comunicar?"></textarea>

</div>

<div class="card">

<h3>🔟 Conduta</h3>
<textarea placeholder="Estratégias"></textarea>
<textarea placeholder="Encaminhamentos"></textarea>
<textarea placeholder="Orientações"></textarea>
<textarea placeholder="Plano de cuidado"></textarea>

</div>

<button onclick="salvarProntuario()">Salvar Prontuário</button>
