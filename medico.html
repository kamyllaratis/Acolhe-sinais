<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Modo Médico</title>
</head>
<body>

<h2>🩺 Modo Médico</h2>

<h3>Pacientes</h3>

<div id="lista"></div>

<br>

<button onclick="window.location.href='menu.html'">Voltar</button>

<script>
<script>
function carregarPacientes() {
  const lista = JSON.parse(localStorage.getItem("pacientes")) || [];
  const container = document.getElementById("lista");

  container.innerHTML = "";

  lista.forEach((p, index) => {
    container.innerHTML += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <b>Nome:</b> ${p.nome}<br>
        <b>Idade:</b> ${p.idade}<br>
        <b>Sintomas:</b> ${p.sintomas.join(", ")}<br><br>

        <button onclick="removerPaciente(${index})">Excluir</button>
      </div>
    `;
  });
}

function removerPaciente(index) {
  let lista = JSON.parse(localStorage.getItem("pacientes")) || [];

  lista.splice(index, 1);

  localStorage.setItem("pacientes", JSON.stringify(lista));

  carregarPacientes();
}

carregarPacientes();
</script>
