<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo Médico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>🩺 Modo Médico</h2>

<h3>Pacientes</h3>

<div id="lista"></div>

<br>

<button onclick="window.location.href='menu.html'">Voltar</button>

</div>

<script>
function carregarPacientes() {
  const lista = JSON.parse(localStorage.getItem("pacientes")) || [];

  const container = document.getElementById("lista");

  container.innerHTML = "";

  lista.forEach((p, index) => {
    container.innerHTML += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <strong>Nome:</strong> ${p.nome} <br>
        <strong>Idade:</strong> ${p.idade} <br>
        <strong>Sintomas:</strong> ${p.sintomas.join(", ")}
      </div>
    `;
  });
}

carregarPacientes();
</script>

</body>
</html>
