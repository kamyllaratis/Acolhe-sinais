<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Modo Médico</title>
</head>
<body>

<h2>🩺 Modo Médico</h2>

<h3>Pacientes</h3>

<div id="lista"></div>

<br>

<button onclick="window.location.href='menu.html'">Voltar</button>

<script>
const lista = JSON.parse(localStorage.getItem("pacientes")) || [];

const container = document.getElementById("lista");

if (lista.length === 0) {
  container.innerHTML = "<p>Nenhum paciente cadastrado</p>";
} else {
  lista.forEach(p => {
    container.innerHTML += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <b>Nome:</b> ${p.nome}<br>
        <b>Idade:</b> ${p.idade}<br>
        <b>Sintomas:</b> ${p.sintomas.join(", ")}
      </div>
    `;
  });
}
</script>

</body>
</html>
