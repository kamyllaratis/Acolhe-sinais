<!DOCTYPE html>
<html>
<head>
<title>Médico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🩺 Pacientes</h2>

<div id="lista"></div>
  <script>
const tipo = localStorage.getItem("tipoUsuario");

if (tipo !== "medico") {
  alert("Acesso restrito");
  window.location.href = "login.html";
}

function carregar() {
  const lista = JSON.parse(localStorage.getItem("pacientes")) || [];
  const div = document.getElementById("lista");

  div.innerHTML = "";

  lista.forEach((p, index) => {
    div.innerHTML += `
      <div class="card">
        <b>Nome:</b> ${p.nome}<br>
        <b>Idade:</b> ${p.idade}<br>
        <b>Sintomas:</b> ${p.sintomas.join(", ")}<br><br>

        <textarea placeholder="Evolução..." onchange="salvarEvolucao(${index}, this.value)">
          ${p.evolucao || ""}
        </textarea>

        <input placeholder="Resultado de exame" 
        onchange="salvarResultado(${index}, this.value)" 
        value="${p.resultado || ""}">

        <br><br>
        <button onclick="remover(${index})">Excluir</button>
      </div>
    `;
  });
}

function salvarEvolucao(index, texto) {
  let lista = JSON.parse(localStorage.getItem("pacientes")) || [];
  lista[index].evolucao = texto;
  localStorage.setItem("pacientes", JSON.stringify(lista));
}

function salvarResultado(index, texto) {
  let lista = JSON.parse(localStorage.getItem("pacientes")) || [];
  lista[index].resultado = texto;
  localStorage.setItem("pacientes", JSON.stringify(lista));
}

function remover(index) {
  let lista = JSON.parse(localStorage.getItem("pacientes")) || [];
  lista.splice(index, 1);
  localStorage.setItem("pacientes", JSON.stringify(lista));
  carregar();
}

carregar();
</script>

</body>
</html>
