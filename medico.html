<!DOCTYPE html>
<html>
<head>
<title>Médico</title>
</head>
<body>

<h2>🩺 Pacientes</h2>

<div id="lista"></div>

<script>
const tipo = localStorage.getItem("tipoUsuario");

if (tipo !== "medico") {
  alert("Acesso restrito");
  window.location.href = "login.html";
}

function carregar() {
  const lista = JSON.parse(localStorage.getItem("pacientes")) || [];
  const div = document.getElementById("lista");

  div.innerHTML = "";

  lista.forEach(p => {
    div.innerHTML += `<p>${p.nome} - ${p.idade} - ${p.sintomas.join(", ")}</p>`;
  });
}

carregar();
</script>

</body>
</html>
