<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paciente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Cadastro do Paciente</h2>

<input id="nome" placeholder="Nome do paciente">
<input id="idade" placeholder="Idade">

<h3>Sintomas:</h3>

<div class="sintomas">

  <label><input type="checkbox" value="Febre"> 🤒 Febre</label>
  <label><input type="checkbox" value="Tosse"> 😷 Tosse</label>
  <label><input type="checkbox" value="Dor"> 🤕 Dor</label>
  <label><input type="checkbox" value="Dor no peito"> ❤️ Dor no peito</label>
  <label><input type="checkbox" value="Falta de ar"> 😮‍💨 Falta de ar</label>
  <label><input type="checkbox" value="Náusea"> 🤢 Náusea</label>
  <label><input type="checkbox" value="Vômito"> 🤮 Vômito</label>
  <label><input type="checkbox" value="Tontura"> 😵 Tontura</label>
  <label><input type="checkbox" value="Diarreia"> 💩 Diarreia</label>
  <label><input type="checkbox" value="Fraqueza"> 💪 Fraqueza</label>
  <label><input type="checkbox" value="Sudorese"> 😰 Sudorese</label>
  <label><input type="checkbox" value="Confusão mental"> 🧠 Confusão mental</label>
  <label><input type="checkbox" value="Sangramento"> 🩸 Sangramento</label>

</div>

<button onclick="salvarPaciente()">Enviar</button>

</div>
<script src="script.js"></script>
</body>
</html>
