<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acolhe Sinais</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b4eff">

<style>
body{margin:0;font-family:-apple-system;background:#eef2ff}
.header{background:#2b4eff;color:#fff;padding:15px;text-align:center;font-weight:bold}
.tela{display:none;padding:20px}
.ativa{display:block}
.card{background:#fff;padding:20px;border-radius:20px;margin-top:20px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;font-size:16px}
.primary{background:#2b4eff;color:#fff}
.sec{background:#ddd}
.progress{height:6px;background:#ddd}
.bar{height:6px;background:#2b4eff;width:0%}
</style>
</head>

<body>

<div class="header">💙 Acolhe Sinais</div>
<div class="progress"><div class="bar" id="bar"></div></div>

<!-- INICIO -->
<div id="inicio" class="tela ativa">
<div class="card">
<p>Olá 👋 Qual seu nome?</p>
<input id="nome">
<button class="primary" onclick="go('motivo',10)">Continuar</button>
</div>
</div>

<!-- MOTIVO -->
<div id="motivo" class="tela">
<div class="card">
<p>Como posso ajudar?</p>
<button onclick="save('mal estar');go('sintomas',20)">😷 Me sinto mal</button>
<button onclick="save('consulta');go('espera',60)">👩‍⚕️ Consulta</button>
<button onclick="go('texto',20)">✍️ Escrever</button>
</div>
</div>

<!-- SINTOMAS -->
<div id="sintomas" class="tela">
<div class="card">
<p>Quais sintomas?</p>
<button onclick="save('dor');go('dor',30)">🤕 Dor</button>
<button onclick="save('febre')">🤒 Febre</button>
<button onclick="save('tosse')">😷 Tosse</button>
<button onclick="save('vomito')">🤢 Vômito</button>
<button onclick="save('tontura')">😵 Tontura</button>
<button onclick="save('falta de ar');urgente()">😮‍💨 Falta de ar</button>
<button onclick="go('texto',30)">✍️ Outro</button>
</div>
</div>

<!-- DOR -->
<div id="dor" class="tela">
<div class="card">
<p>Nível da dor:</p>
<button onclick="save('leve')">😊 Leve</button>
<button onclick="save('media')">😐 Média</button>
<button onclick="save('forte')">😣 Forte</button>
<button onclick="save('intensa');urgente()">😭 Muito forte</button>
<button class="primary" onclick="go('local',40)">Continuar</button>
</div>
</div>

<!-- LOCAL -->
<div id="local" class="tela">
<div class="card">
<p>Onde está a dor?</p>
<button onclick="save('cabeca')">🧠 Cabeça</button>
<button onclick="save('peito');urgente()">🫁 Peito</button>
<button onclick="save('abdomen')">🦠 Abdômen</button>
<button onclick="save('perna')">🦵 Perna</button>
<button onclick="save('braco')">🤚 Braço</button>
<button class="primary" onclick="go('tempo',50)">Continuar</button>
</div>
</div>

<!-- TEMPO -->
<div id="tempo" class="tela">
<div class="card">
<p>Há quanto tempo?</p>
<button onclick="save('hoje')">🕐 Hoje</button>
<button onclick="save('dias')">📅 Alguns dias</button>
<button onclick="save('semanas')">🗓️ Semanas</button>
<button class="primary" onclick="go('exame',60)">Continuar</button>
</div>
</div>

<!-- EXAMES -->
<div id="exame" class="tela">
<div class="card">
<p>Possíveis exames:</p>
<button onclick="save('sangue')">🩸 Sangue</button>
<button onclick="save('raio x')">📸 Raio-X</button>
<button onclick="save('ultrassom')">💻 Ultrassom</button>
<p>Aguarde ser chamado 📢</p>
<button class="primary" onclick="go('espera',70)">Continuar</button>
</div>
</div>

<!-- ESPERA -->
<div id="espera" class="tela">
<div class="card">
<p>⏳ Aguarde atendimento</p>
<button class="primary" onclick="go('consulta',80)">Fui atendido</button>
</div>
</div>

<!-- CONSULTA -->
<div id="consulta" class="tela">
<div class="card">
<p>👩‍⚕️ Consulta em andamento</p>
<button class="primary" onclick="go('final',100)">Finalizar</button>
</div>
</div>

<!-- FINAL -->
<div id="final" class="tela">
<div class="card">
<p id="urgencia"></p>
<button onclick="resumo()">📋 Ver resumo</button>
<button onclick="falar()">🔊 Ouvir</button>
</div>
</div>

<!-- TEXTO -->
<div id="texto" class="tela">
<div class="card">
<p>Descreva:</p>
<textarea id="txt"></textarea>
<button onclick="save(document.getElementById('txt').value);go('exame',60)" class="primary">Enviar</button>
</div>
</div>

<!-- RESUMO -->
<div id="resumo" class="tela">
<div class="card">
<h3>📋 Resumo</h3>
<p id="saida"></p>
<button onclick="go('inicio',0)">Reiniciar</button>
</div>
</div>

<script>
let dados=[];
let nivel="🟢 Baixo";

function go(id,p){
document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
document.getElementById(id).classList.add('ativa');
document.getElementById('bar').style.width=p+"%";
}

function save(i){dados.push(i)}

function urgente(){
nivel="🔴 URGENTE";
}

function resumo(){
let nome=document.getElementById('nome').value;
document.getElementById('saida').innerText=
"Paciente: "+nome+
"\nClassificação: "+nivel+
"\nDados: "+dados.join(", ");
document.getElementById('urgencia').innerText="Classificação: "+nivel;
go('resumo',100);
}

function falar(){
let msg=new SpeechSynthesisUtterance(document.getElementById('saida').innerText);
speechSynthesis.speak(msg);
}

if('serviceWorker'in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
